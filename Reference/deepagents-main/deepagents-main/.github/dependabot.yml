version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
      major:
        patterns: ["*"]
        update-types:
          - "major"

  - package-ecosystem: "uv"
    directories:
      - "/libs/deepagents"
      - "/libs/cli"
      - "/libs/code"
      - "/libs/evals"
      - "/libs/acp"
      - "/libs/talon"
      - "/libs/partners/daytona"
      - "/libs/partners/modal"
      - "/libs/partners/quickjs"
      - "/libs/partners/runloop"
      - "/libs/partners/vercel"
      - "/examples/async-subagent-server"
      - "/examples/better-harness"
      - "/examples/content-builder-agent"
      - "/examples/deep_research"
      - "/examples/llm-wiki"
      - "/examples/nvidia_deep_agent"
      - "/examples/text-to-sql-agent"
    schedule:
      interval: "monthly"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
      major:
        patterns: ["*"]
        update-types:
          - "major"
