# Creates release PRs based on conventional commits.
#
# When commits land on main, this workflow either:
# - Creates/updates a release PR with changelog and version bump
# - When a release PR is merged, triggers the release workflow
#
# GitHub releases are created by release.yml after all checks pass,
# not by release-please directly (skip-github-release: true in config).

name: "⚠️ (Automated) Release Please"

on:
  push:
    branches:
      - main

# Do not put workflow-level concurrency here. Release commits must be able to
# reach `trigger-releases` even while a normal push is waiting out an in-flight
# publish; otherwise GitHub can coalesce away the pending release-commit run.
# The release-please action itself is serialized at the job level below.

permissions:
  contents: read

jobs:
  # Block empty commits before release-please ever sees them. An empty commit
  # has no file paths for release-please to scope to, so it falls back to
  # bumping every package — see the "Empty commit fan-out" entry in
  # .github/RELEASING.md.
  guard-empty-commit:
    name: Block empty commits on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Reject empty commits
        run: |
          if [ "$(git rev-list --count HEAD)" -lt 2 ]; then
            echo "Single-commit history; skipping empty-commit guard."
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --format=%s HEAD)
          SHA=$(git rev-parse HEAD)
          PARENT_COUNT=$(git show --no-patch --format=%P HEAD | wc -w | tr -d ' ')
          if [ "$PARENT_COUNT" -gt 2 ]; then
            echo "::error::Octopus merge detected on main: $SHA \"$COMMIT_MSG\""
            echo "::error::The empty-commit guard only supports one- or two-parent commits. Recreate this as a normal two-parent merge."
            exit 1
          fi

          # `git diff-tree` reports no paths for merge commits unless given -m.
          # Compare merges to their first parent so non-empty merges pass before
          # the repo-hotfix history-repair exception below.
          if [ "$PARENT_COUNT" -eq 2 ]; then
            CHANGED=$(git diff --name-only HEAD^1 HEAD)
          else
            CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD)
          fi
          if [ -n "$CHANGED" ]; then
            echo "HEAD touches files; proceeding."
            exit 0
          fi

          if [ "$PARENT_COUNT" -eq 2 ]; then
            case "$COMMIT_MSG" in
              "hotfix(repo):"*) ;;
              *)
                echo "::error::Empty merge commit detected on main: $SHA \"$COMMIT_MSG\""
                echo "::error::Only repo-scoped hotfix merge commits may use the history-repair exception."
                echo "::error::See .github/RELEASING.md -> \"Empty commit fan-out\"."
                exit 1
                ;;
            esac

            MERGED_COMMITS=$(git rev-list HEAD^1..HEAD^2)
            if [ -z "$MERGED_COMMITS" ]; then
              echo "::error::Empty merge commit detected on main: $SHA \"$COMMIT_MSG\""
              echo "::error::The merge commit does not introduce any second-parent commits."
              echo "::error::See .github/RELEASING.md -> \"Empty commit fan-out\"."
              exit 1
            fi

            EMPTY_MERGED_COMMITS=""
            for COMMIT in $MERGED_COMMITS; do
              COMMIT_PARENT_COUNT=$(git show --no-patch --format=%P "$COMMIT" | wc -w | tr -d ' ')
              if [ "$COMMIT_PARENT_COUNT" -gt 2 ]; then
                echo "::error::Octopus merge detected in merged branch: $COMMIT"
                echo "::error::The empty-commit guard only supports one- or two-parent commits. Recreate this as normal two-parent merges."
                exit 1
              fi
              if [ "$COMMIT_PARENT_COUNT" -eq 2 ]; then
                COMMIT_CHANGED=$(git diff --name-only "$COMMIT^1" "$COMMIT")
              else
                COMMIT_CHANGED=$(git diff-tree --no-commit-id --name-only -r "$COMMIT")
              fi
              if [ -z "$COMMIT_CHANGED" ]; then
                EMPTY_MERGED_COMMITS="$EMPTY_MERGED_COMMITS $COMMIT"
              fi
            done
            if [ -z "$EMPTY_MERGED_COMMITS" ]; then
              echo "Empty repo hotfix merge commit detected, but every commit merged from the second parent touches files; proceeding."
              git log --oneline HEAD^1..HEAD^2
              exit 0
            fi
            echo "::error::Empty merge commit detected on main: $SHA \"$COMMIT_MSG\""
            echo "::error::The merged branch contains empty commits:$EMPTY_MERGED_COMMITS"
            echo "::error::Every commit in a history-repair branch must touch files so release-please can scope it."
            echo "::error::See .github/RELEASING.md -> \"Empty commit fan-out\"."
            exit 1
          fi

          echo "::error::Empty commit detected on main: $SHA \"$COMMIT_MSG\""
          echo "::error::release-please scopes commits to packages by changed file paths. An empty commit has none, so every package gets bumped."
          echo "::error::Recovery: revert this commit on main, then push a non-empty commit scoped to a single package directory. See .github/RELEASING.md -> \"Empty commit fan-out\"."
          exit 1

  # Release commits are the only runs that can dispatch release.yml, so detect
  # them before the wait/serialized release-please maintenance path. This job is
  # intentionally short-lived and not in the `release-please` concurrency group.
  detect-release-commit:
    needs: guard-empty-commit
    name: Detect merged release PR
    runs-on: ubuntu-latest
    outputs:
      release-commit: ${{ steps.check-releases.outputs.release-commit }}
      cli-release: ${{ steps.check-releases.outputs.cli-release }}
      sdk-release: ${{ steps.check-releases.outputs.sdk-release }}
      acp-release: ${{ steps.check-releases.outputs.acp-release }}
      code-release: ${{ steps.check-releases.outputs.code-release }}
      talon-release: ${{ steps.check-releases.outputs.talon-release }}
      daytona-release: ${{ steps.check-releases.outputs.daytona-release }}
      modal-release: ${{ steps.check-releases.outputs.modal-release }}
      runloop-release: ${{ steps.check-releases.outputs.runloop-release }}
      vercel-release: ${{ steps.check-releases.outputs.vercel-release }}
      quickjs-release: ${{ steps.check-releases.outputs.quickjs-release }}
      release-version: ${{ steps.check-releases.outputs.release-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Check if release PRs were merged
        id: check-releases
        run: |
          if ! CHANGED=$(git diff --name-only HEAD~1 HEAD); then
            echo "::error::git diff failed — is fetch-depth sufficient?"
            exit 1
          fi

          if ! COMMIT_MSG=$(git log -1 --format=%s HEAD); then
            echo "::error::git log failed — cannot read commit message."
            exit 1
          fi

          echo "Commit message: $COMMIT_MSG"
          echo "Changed files:"
          echo "$CHANGED"

          if [ -z "$COMMIT_MSG" ]; then
            echo "::warning::Commit message is empty — no release will be triggered."
          fi

          # Extract version from release commit message: "release(component): X.Y.Z"
          # [^ ]+ stops at the first space to avoid capturing trailing PR refs like "(#1234)"
          # NOTE: separate-pull-requests=true ensures one release commit per workflow run,
          # so a single version output is correct — each package triggers its own run.
          RELEASE_VERSION=$(echo "$COMMIT_MSG" | sed -nE 's/^release\([^)]+\): +([^ ]+).*/\1/p')
          echo "release-version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ -n "$RELEASE_VERSION" ]; then
            echo "release-commit=true" >> "$GITHUB_OUTPUT"
            echo "Extracted release version: $RELEASE_VERSION"
          elif echo "$COMMIT_MSG" | grep -qE "^release\("; then
            # release.yml requires `version` as a non-empty input. Fail loudly
            # here rather than dispatch with an empty annotation that the
            # downstream workflow would silently accept via the API.
            echo "::error::Commit looks like a release but version extraction failed: $COMMIT_MSG"
            exit 1
          else
            echo "release-commit=false" >> "$GITHUB_OUTPUT"
          fi

          # grep -q in an `if` conditional is safe under set -eo pipefail;
          # bash suppresses errexit inside `if` compound commands.

          if echo "$CHANGED" | grep -q "^libs/cli/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-cli\):"; then
            echo "cli-release=true" >> "$GITHUB_OUTPUT"
            echo "CLI release detected: $COMMIT_MSG"
          else
            echo "cli-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/deepagents/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents\):"; then
            echo "sdk-release=true" >> "$GITHUB_OUTPUT"
            echo "SDK release detected: $COMMIT_MSG"
          else
            echo "sdk-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/acp/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-acp\):"; then
            echo "acp-release=true" >> "$GITHUB_OUTPUT"
            echo "ACP release detected: $COMMIT_MSG"
          else
            echo "acp-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/code/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-code\):"; then
            echo "code-release=true" >> "$GITHUB_OUTPUT"
            echo "Deep Agents Code release detected: $COMMIT_MSG"
          else
            echo "code-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/talon/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(deepagents-talon\):"; then
            echo "talon-release=true" >> "$GITHUB_OUTPUT"
            echo "Deep Agents Talon release detected: $COMMIT_MSG"
          else
            echo "talon-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/daytona/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-daytona\):"; then
            echo "daytona-release=true" >> "$GITHUB_OUTPUT"
            echo "Daytona release detected: $COMMIT_MSG"
          else
            echo "daytona-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/modal/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-modal\):"; then
            echo "modal-release=true" >> "$GITHUB_OUTPUT"
            echo "Modal release detected: $COMMIT_MSG"
          else
            echo "modal-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/runloop/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-runloop\):"; then
            echo "runloop-release=true" >> "$GITHUB_OUTPUT"
            echo "Runloop release detected: $COMMIT_MSG"
          else
            echo "runloop-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/vercel/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-vercel-sandbox\):"; then
            echo "vercel-release=true" >> "$GITHUB_OUTPUT"
            echo "Vercel release detected: $COMMIT_MSG"
          else
            echo "vercel-release=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -q "^libs/partners/quickjs/CHANGELOG.md$" && echo "$COMMIT_MSG" | grep -qE "^release\(langchain-quickjs\):"; then
            echo "quickjs-release=true" >> "$GITHUB_OUTPUT"
            echo "QuickJS release detected: $COMMIT_MSG"
          else
            echo "quickjs-release=false" >> "$GITHUB_OUTPUT"
          fi

  # Wait out an in-flight publish instead of recomputing against half-updated state.
  #
  # release.yml (the PyPI publisher) creates the git tag and flips the release
  # PR's `autorelease: pending` -> `autorelease: tagged` label minutes *after*
  # the release PR merges, in a separate dispatched run. In that window the
  # manifest already names the new version but the tag does not exist yet. A
  # normal (non-release) push landing in that window re-runs release-please
  # against this half-updated state: it finds no tag, and if the label has just
  # flipped, release-please's own "untagged outstanding -> abort" guard appears
  # not to fire — so it treats the component as never-released and proposes a
  # bootstrap downgrade (observed once: 0.1.8 -> 0.1.0 with the full history).
  #
  # Crucially, completing a publish does NOT push to main (it only creates a tag
  # + GitHub release), so nothing re-triggers release-please.yml afterwards. An
  # earlier version of this guard *skipped* release-please for the in-flight
  # window — but "skip" stranded this push's commits until some unrelated future
  # push happened to re-run release-please, which looks like a cancel, not a
  # defer. So instead we *wait*: poll the label until the publish finishes (or a
  # bounded timeout), then let release-please run in this same run against the
  # now-consistent state. This job is deliberately outside the `release-please`
  # concurrency group so release-commit runs can still dispatch publishing.
  #
  # Release commits bypass this wait entirely: their run must reach
  # `trigger-releases` to dispatch the publish.
  #
  # Three fallbacks if the wait can't resolve cleanly:
  #   * Publish genuinely *stuck* past MAX_WAIT (label never flips, but GitHub is
  #     answering): skip=true, deferring to the next push, so a hung publish
  #     outside this run's control never paints main red.
  #   * The matching release run already failed/cancelled/timed out: fail the job
  #     loudly (exit 1), because the pending label now means operator action is
  #     needed rather than an in-flight publish.
  #   * GitHub itself unreadable (gh keeps erroring so we can't tell whether a
  #     publish is in flight): fail the job loudly (exit 1). release-please is
  #     then skipped via `needs`, and a red guard is the honest signal — better
  #     than silently guessing "in flight" for 45 min and stranding commits.
  guard-pending-release:
    needs: [guard-empty-commit, detect-release-commit]
    name: Check for in-flight publish
    if: needs.detect-release-commit.outputs.release-commit != 'true'
    runs-on: ubuntu-latest
    # Backstops the poll loop at the job level (covers checkout + every `gh`
    # round-trip, not just the sleeps). Sits ~10 min above MAX_WAIT (45 min) so
    # the loop's graceful skip=true fallback wins the race over a hard job
    # timeout even when `gh` calls are slow under runner contention — a hard
    # timeout would leave `skip` unset, and the downstream gate fails closed on
    # an unset value, blocking release-please until the next push.
    timeout-minutes: 55
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Wait for in-flight releases
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # No `-e`: the poll loop handles transient `gh` failures itself rather
          # than aborting the job, which would skip the wait entirely.
          set -uo pipefail

          # `autorelease: pending` is release-please-action's built-in label,
          # applied to release PRs and cleared to `autorelease: tagged` by
          # release.yml once the tag and GitHub release exist, so a merged PR
          # still carrying it means a publish has not finished.
          #
          # --limit is explicit and generous: the default (30) could drop a
          # genuinely stuck pending PR past the window precisely in the backlog
          # scenario this guard exists to catch, silently reporting "none".
          list_pending_json() {
            gh pr list --repo "$REPO" --state merged \
              --label "autorelease: pending" --limit 100 --json number,title
          }

          format_pending() {
            jq -r '[.[] | "#\(.number) \(.title)"] | join("; ")'
          }

          # Echoes a line per merged pending PR whose matching release.yml run has
          # already finished unsuccessfully; empty output means none failed.
          # Returns non-zero only when GitHub is unreadable, so the caller can
          # distinguish "no failures" from "couldn't tell".
          #
          # Matching is `release.yml` run displayTitle == release PR title. That
          # holds only because two independently-maintained templates render
          # byte-identically: release-please-config.json's
          # `pull-request-title-pattern` ("release(${component}): ${version}") and
          # release.yml's `run-name` ("release(<package>): <version>"), with
          # component == the dispatched package. This is the same run-name
          # coupling that `find_run_url` (in the trigger-releases job) reconstructs
          # from parts and warns about — see its lock-step comment. If either
          # template drifts, or a `package-override` whose value differs from the
          # component is ever dispatched, the match silently always-misses: this
          # guard then finds nothing and the job degrades to the normal wait/skip
          # path rather than misfiring. Fail-open by design — a missed match never
          # blocks a release, it only forgoes the early loud failure.
          #
          # --event workflow_dispatch mirrors find_run_url: release.yml only ever
          # runs via dispatch, and the filter keeps an unrelated run that happens
          # to share a title from being mistaken for the release publish.
          describe_failed_pending_releases() {
            local pending_json="$1"
            local runs_json
            if ! runs_json=$(gh run list --repo "$REPO" --workflow release.yml \
              --event workflow_dispatch \
              --limit 100 --json displayTitle,status,conclusion,url,createdAt); then
              return 1
            fi
            # action_required is included deliberately: a *completed* run carrying
            # it means the publish needs a human (e.g. an environment approval that
            # resolved to this conclusion), which warrants the same loud failure as
            # an outright error. Runs merely *awaiting* approval have status !=
            # "completed" and are excluded by the status check below.
            #
            # Any single failed pending release makes this emit a line, and the
            # caller fails the whole guard closed — even if a sibling PR's publish
            # is still legitimately in flight. That is intentional: once a human
            # must intervene, release-please must not run against half-updated
            # state regardless of what else is mid-publish.
            jq -r --argjson prs "$pending_json" '
              def failed_conclusion:
                . == "failure" or . == "cancelled" or . == "timed_out" or
                . == "action_required" or . == "startup_failure";
              $prs[] as $pr
              | ([.[] | select(.displayTitle == $pr.title)] | sort_by(.createdAt) | reverse | .[0]) as $run
              | select($run != null and $run.status == "completed" and ($run.conclusion | failed_conclusion))
              | "#\($pr.number) \($pr.title) -> \($run.conclusion): \($run.url)"
            ' <<< "$runs_json"
          }

          fail_failed_releases() {
            echo "::error::Merged release PR(s) are still labeled 'autorelease: pending', but their matching package release run did not finish successfully:"
            printf '%s\n' "$FAILED_RELEASES" | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done
            echo "::error::Fix or rerun the failed package release before running release-please again. Only update labels manually if the tag and GitHub release were created."
            {
              echo "## release-please blocked by failed release"
              echo ""
              echo "The following merged release PR(s) are still labeled \`autorelease: pending\`, but their matching \`release.yml\` run has already completed unsuccessfully:"
              echo ""
              printf '%s\n' "$FAILED_RELEASES"
              echo ""
              echo "Fix or rerun the failed package release before running release-please again. Only update labels manually if the tag and GitHub release were created."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          # poll_pending sets PENDING from list_pending_json, FAILED_RELEASES
          # from matching `release.yml` runs, and tracks consecutive failures in
          # QUERY_FAILS. Called directly (never in a subshell) so the counter
          # persists across iterations. On a `gh` error we set PENDING to a
          # non-empty sentinel so the caller keeps waiting rather than proceed on
          # unverified state — but a *sustained* failure means we genuinely
          # cannot read release state, which we must surface loudly (see the
          # MAX_QUERY_FAILS bail-out below) rather than mislabel as "in flight".
          QUERY_FAILS=0
          poll_pending() {
            local next_failed
            local next_pending
            local next_pending_json

            if ! next_pending_json=$(list_pending_json); then
              QUERY_FAILS=$((QUERY_FAILS + 1))
              PENDING="(failed to query GitHub)"
              FAILED_RELEASES=""
              echo "::warning::Failed to query GitHub for release state (${QUERY_FAILS} consecutive)."
              return
            fi

            next_pending=$(printf '%s\n' "$next_pending_json" | format_pending)
            if [ -n "$next_pending" ]; then
              if ! next_failed=$(describe_failed_pending_releases "$next_pending_json"); then
                QUERY_FAILS=$((QUERY_FAILS + 1))
                PENDING="$next_pending"
                FAILED_RELEASES=""
                echo "::warning::Failed to query GitHub for release workflow state (${QUERY_FAILS} consecutive)."
                return
              fi
            else
              next_failed=""
            fi

            QUERY_FAILS=0
            PENDING="$next_pending"
            FAILED_RELEASES="$next_failed"
          }

          poll_pending
          if [ -n "$FAILED_RELEASES" ]; then
            fail_failed_releases
          fi
          if [ -z "$PENDING" ]; then
            echo "No in-flight releases; proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Poll until the pending label clears. Publishes normally finish in a
          # few minutes; MAX_WAIT is generous headroom for runner contention and
          # transient GitHub API errors. MAX_QUERY_FAILS bounds how long we'll
          # tolerate an *unreadable* GitHub (~2.5 min of back-to-back failures)
          # before failing the job — distinct from a real publish that's slow.
          POLL_INTERVAL=30
          MAX_WAIT=2700 # 45 min
          MAX_QUERY_FAILS=5
          WAITED=0
          echo "::notice::Publish in flight; waiting up to $((MAX_WAIT / 60))m for it to finish before running release-please: $PENDING"

          while [ -n "$PENDING" ] && [ "$WAITED" -lt "$MAX_WAIT" ]; do
            if [ "$QUERY_FAILS" -ge "$MAX_QUERY_FAILS" ]; then
              echo "::error::Could not read release state from GitHub after ${QUERY_FAILS} consecutive failures; refusing to guess whether a publish is in flight. release-please is skipped for this push and runs normally on the next one."
              exit 1
            fi
            sleep "$POLL_INTERVAL"
            WAITED=$((WAITED + POLL_INTERVAL))
            poll_pending
            if [ -n "$FAILED_RELEASES" ]; then
              fail_failed_releases
            fi
            echo "Waited ${WAITED}s; pending: ${PENDING:-<cleared>}"
          done

          if [ -z "$PENDING" ]; then
            echo "In-flight publish(es) finished after ${WAITED}s; proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            {
              echo "## release-please proceeding after wait"
              echo ""
              echo "A publish was in flight; release-please waited ${WAITED}s for the \`autorelease: pending\` label(s) to clear, then ran normally against the now-consistent state."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Timed out: the publish is likely stuck. Fall back to deferring to the
          # next push rather than failing — a hung publish is outside this run's
          # control and the operator must clear it manually.
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::warning::release-please deferred after waiting ${WAITED}s: publish still in flight (or release state unverifiable): $PENDING"
          {
            echo "## release-please deferred"
            echo ""
            echo "A publish was still in flight (or GitHub's release state stayed unverifiable) after waiting $((MAX_WAIT / 60))m — these merged release PR(s) are still labeled \`autorelease: pending\`:"
            echo ""
            echo "$PENDING"
            echo ""
            echo "release-please was skipped for this push to avoid recomputing releases against half-updated state (the git tag is not created until the publish finishes). It runs normally on the next push once the publish completes and the label flips to \`autorelease: tagged\`."
            echo ""
            echo "If a publish is genuinely **stuck** on \`autorelease: pending\`, clear it per [Release PR Stuck with \"autorelease: pending\" Label](https://github.com/langchain-ai/deepagents/blob/main/.github/RELEASING.md#release-pr-stuck-with-autorelease-pending-label)."
          } >> "$GITHUB_STEP_SUMMARY"

  release-please:
    needs: [guard-empty-commit, detect-release-commit, guard-pending-release]
    # Fail closed: run only on an explicit `skip=false`. An unset value (guard
    # crashed or hit its job timeout before writing the output) blocks
    # release-please rather than letting it recompute against unverified state.
    if: |
      needs.detect-release-commit.outputs.release-commit != 'true' &&
      needs.guard-pending-release.outputs.skip == 'false'
    runs-on: ubuntu-latest
    # Serialize only the release-please action, which mutates shared release
    # branches and reads in-flight release state. Keeping this at job scope lets
    # release-commit runs dispatch publishing without queueing behind long guard
    # waits from ordinary pushes.
    concurrency:
      group: release-please
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # release-please uses GITHUB_TOKEN, so its PR events don't trigger
      # pull_request_target (GitHub's infinite-loop prevention). Reuse the
      # shared labelPR() helper so labeling logic stays in one place.
      - name: Label release PRs
        if: steps.release.outputs.prs != '[]' && steps.release.outputs.prs != ''
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        with:
          script: |
            let prs;
            try {
              prs = JSON.parse(process.env.RELEASE_PRS || '[]');
            } catch (e) {
              core.warning(`Failed to parse RELEASE_PRS: ${e.message}`);
              return;
            }
            if (!prs.length) return;
            const { owner, repo } = context.repo;
            const { h } = require('./.github/scripts/pr-labeler.js').loadAndInit(github, owner, repo, core);
            for (const pr of prs) {
              try {
                const labels = await h.labelPR(pr.number, { title: pr.title });
                console.log(`PR #${pr.number} ("${pr.title}"): +[${labels.join(', ')}]`);
              } catch (e) {
                core.warning(`Failed to label PR #${pr.number}: ${e.message}`);
              }
            }

  # Update uv.lock files when release-please creates/updates a PR
  # release-please updates pyproject.toml versions but doesn't regenerate lockfiles
  # https://github.com/googleapis/release-please/issues/2561
  update-lockfiles:
    needs: release-please
    if: needs.release-please.outputs.prs != '[]' && needs.release-please.outputs.prs
      != ''
    name: Update lockfiles
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: update-lockfiles-${{ matrix.pr.headBranchName }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.release-please.outputs.prs) }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ matrix.pr.headBranchName }}

      - name: Setup uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Update lockfiles
        id: update-lockfiles
        run: |
          regenerate() {
            git ls-files "uv.lock" "**/uv.lock" | sort | while IFS= read -r lockfile; do
              dir=$(dirname "$lockfile")
              echo "Updating $dir"
              if [ "$dir" = "libs/acp" ]; then
                uv lock --directory "$dir" --python 3.14
              else
                uv lock --directory "$dir" --python 3.12
              fi
            done
          }
          regenerate

      - name: Commit and push
        # Retry on push rejection. Concurrent release-please runs (one per push to
        # main) all update the same release branch, so a stale local checkout can
        # lose the push race ("cannot lock ref ...: is at X but expected Y"). On
        # rejection: fetch the new tip, reset, re-run `uv lock` against it, and
        # retry. `uv lock` is deterministic on a given pyproject.toml, so this
        # converges — and if the rebased state already has the right lockfiles
        # (another run won), the diff is empty and we exit cleanly.
        env:
          RELEASE_BRANCH: ${{ matrix.pr.headBranchName }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          regenerate() {
            git ls-files "uv.lock" "**/uv.lock" | sort | while IFS= read -r lockfile; do
              dir=$(dirname "$lockfile")
              if [ "$dir" = "libs/acp" ]; then
                uv lock --directory "$dir" --python 3.14
              else
                uv lock --directory "$dir" --python 3.12
              fi
            done
          }

          stage_and_commit() {
            git add "**/uv.lock"
            if git diff --staged --quiet; then
              return 1
            fi
            git diff --staged --stat
            git commit -m "chore: update lockfiles"
            return 0
          }

          if ! stage_and_commit; then
            echo "No lockfile changes to commit"
            exit 0
          fi

          for attempt in 1 2 3; do
            if git push origin "HEAD:${RELEASE_BRANCH}"; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::Push rejected on attempt ${attempt}; rebasing onto fresh ${RELEASE_BRANCH} and retrying"
            # Reset to FETCH_HEAD (the SHA `git fetch` just resolved) rather than
            # `origin/${RELEASE_BRANCH}`, so we don't depend on the remote's
            # default fetch refspec being configured to update the
            # remote-tracking ref.
            git fetch origin "${RELEASE_BRANCH}"
            git reset --hard FETCH_HEAD
            regenerate
            if ! stage_and_commit; then
              echo "Lockfile already up-to-date on remote after rebase; nothing to push"
              exit 0
            fi
          done

          echo "::error::Push still rejected after 3 attempts on '${RELEASE_BRANCH}'."
          exit 1

  # Dispatch release.yml for each merged release PR.
  #
  # We use `gh workflow run` (workflow_dispatch) rather than `uses:` (workflow_call)
  # because PyPI Trusted Publishing does not officially support reusable workflows
  # (https://docs.pypi.org/trusted-publishers/troubleshooting/#reusable-workflows-on-github).
  # Dispatching makes each release run a top-level workflow, so the OIDC token
  # claim points at release.yml directly. Trade-off: release.yml runs are
  # separate runs in the Actions tab rather than nested under release-please.
  #
  # release-sha pins the release *artifact* (build, tests, GitHub release tag) to
  # the release-PR merge commit. github.sha here IS the merge commit because
  # release-please.yml only fires on push events, and the release PR was just
  # merged. Forwarding it explicitly means release.yml always reads
  # inputs.release-sha — the auto path and workflow_dispatch retries share one
  # code path, so neither can silently tag a different commit (see RELEASING.md
  # -> Manual Release).
  #
  # Note: `gh workflow run --ref main` resolves the *workflow YAML* against
  # main@HEAD at dispatch time, not against $RELEASE_SHA. The dispatches API
  # accepts only branch/tag names for `ref`, not SHAs, so this race window
  # (commit lands on main between this push event and the dispatch call) is
  # unfixable. In practice it is benign: release.yml itself rarely changes, and
  # the artifact still builds from $RELEASE_SHA via the checkout step.
  trigger-releases:
    needs: detect-release-commit
    if: |
      needs.detect-release-commit.outputs.cli-release == 'true' ||
      needs.detect-release-commit.outputs.sdk-release == 'true' ||
      needs.detect-release-commit.outputs.acp-release == 'true' ||
      needs.detect-release-commit.outputs.code-release == 'true' ||
      needs.detect-release-commit.outputs.talon-release == 'true' ||
      needs.detect-release-commit.outputs.daytona-release == 'true' ||
      needs.detect-release-commit.outputs.modal-release == 'true' ||
      needs.detect-release-commit.outputs.runloop-release == 'true' ||
      needs.detect-release-commit.outputs.vercel-release == 'true' ||
      needs.detect-release-commit.outputs.quickjs-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write # required for `gh workflow run` to dispatch release.yml
      issues: read # read release PR labels for opt-in release bypasses
      pull-requests: read # resolve the release PR associated with the merge commit
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.detect-release-commit.outputs.release-version }}
      RELEASE_SHA: ${{ github.sha }}
      SDK_PIN_BYPASS_LABEL: "release: skip sdk pin check"
      RELEASE_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository
        }}/actions/workflows/release.yml
      CLI_RELEASE: ${{ needs.detect-release-commit.outputs.cli-release }}
      SDK_RELEASE: ${{ needs.detect-release-commit.outputs.sdk-release }}
      ACP_RELEASE: ${{ needs.detect-release-commit.outputs.acp-release }}
      CODE_RELEASE: ${{ needs.detect-release-commit.outputs.code-release }}
      TALON_RELEASE: ${{ needs.detect-release-commit.outputs.talon-release }}
      DAYTONA_RELEASE: ${{ needs.detect-release-commit.outputs.daytona-release }}
      MODAL_RELEASE: ${{ needs.detect-release-commit.outputs.modal-release }}
      RUNLOOP_RELEASE: ${{ needs.detect-release-commit.outputs.runloop-release }}
      VERCEL_RELEASE: ${{ needs.detect-release-commit.outputs.vercel-release }}
      QUICKJS_RELEASE: ${{ needs.detect-release-commit.outputs.quickjs-release }}
    steps:
      - name: Dispatch release workflows
        # Best-effort: each package dispatch is independent. If one fails (transient
        # API blip, rate limit, ...), continue with the rest — partial dispatch is
        # better than a half-state where some packages are pending and others were
        # never even attempted. Failures are aggregated and the job exits nonzero
        # at the end so the operator sees them.
        #
        # We also write a markdown banner to $GITHUB_STEP_SUMMARY pointing at the
        # release.yml workflow page. This job only *kicks off* the publish runs;
        # the build/test/PyPI-publish steps live in those separate runs, so the
        # operator needs to click through to find them. The summary makes that
        # one click instead of "where did the publish go?".
        run: |
          set -uo pipefail

          DISPATCHED=()
          FAILED=()
          # Maps package -> the URL of the release.yml run this job kicked off.
          # Populated best-effort by the second-pass poll below; a package left
          # unset just means we couldn't correlate its run in time (it still
          # dispatched).
          declare -A RUN_URLS=()

          # release.yml's `version` input is required and the API silently accepts
          # an empty string, so guard here. release-please.yml's extraction step
          # already aborts on regex misses, but `if:` guards on this job could
          # still let an empty `release-version` reach the dispatch.
          if [ -z "$VERSION" ]; then
            echo "::error::release-version is empty — refusing to dispatch release.yml without a version annotation."
            exit 1
          fi

          # Validate that an output value is exactly "true" or "false". Catches the
          # case where release-please ever emits an empty/unexpected value, which
          # would otherwise silently no-op the dispatch under the `= "true"` check.
          assert_bool() {
            local name="$1" value="$2"
            case "$value" in
              true|false) ;;
              *)
                echo "::warning::$name has unexpected value '$value' (expected 'true' or 'false'); treating as false"
                ;;
            esac
          }

          # Recover the URL of a dispatched run. The workflow_dispatch API does
          # not return the created run's id, so we correlate on release.yml's
          # `run-name`, which renders as "release(<package>): <version>". This
          # string MUST stay in lock-step with release.yml's `run-name`: if that
          # template changes, the jq $title below stops matching and correlation
          # silently always-misses (the best-effort warning fires, nothing else
          # breaks). The title is unique per package per *version* — re-dispatches
          # of the same version share a title, so `--created ">=$started"`
          # (backdated for clock skew) bounds the window and `sort_by | last`
          # takes the most recent match. package/VERSION go to jq via --arg —
          # never interpolated into the filter program — so they stay data, not
          # code. Echoes the URL on stdout, or nothing on no match.
          find_run_url() {
            local package="$1" started="$2"
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow release.yml \
              --event workflow_dispatch \
              --created ">=$started" \
              --limit 50 \
              --json displayTitle,url,createdAt 2>/dev/null \
            | jq -r --arg title "release(${package}): ${VERSION}" \
                'map(select(.displayTitle == $title)) | sort_by(.createdAt) | last | .url // empty' \
              2>/dev/null || true
          }

          # Fail-closed: a non-zero return means "do NOT skip the SDK pin check".
          # Every error path (PR unresolved, label-read API failure) returns
          # non-zero, so a transient API blip can never flip the dangerous bypass
          # on — it only ever turns on for a positively-matched label.
          release_pr_has_label() {
            local label="$1" pr_number="" labels="" rc=0
            # `/commits/{sha}/pulls` lists every PR associated with the commit;
            # filter to the merged one so a non-release PR sharing this SHA can't
            # be mistaken for the release PR (which produced RELEASE_SHA on main).
            pr_number=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/pulls" \
              --jq 'map(select(.merged_at != null)) | .[0].number // empty' 2>/dev/null || true)
            if [ -z "$pr_number" ]; then
              echo "::warning::Could not resolve release PR for $RELEASE_SHA; SDK pin check will be ENFORCED for deepagents-code (bypass label '$label' not read)."
              return 1
            fi
            # Capture the label read separately so an API failure is distinguishable
            # from "label genuinely absent" and can be surfaced. `local` is declared
            # above so it doesn't clobber the captured `$?` here.
            labels=$(gh api "/repos/${GITHUB_REPOSITORY}/issues/${pr_number}/labels" \
              --jq '.[].name' 2>/dev/null) || rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "::warning::Could not read labels for PR #$pr_number (gh api exit $rc); SDK pin check will be ENFORCED for deepagents-code (bypass label '$label' treated as absent)."
              return 1
            fi
            printf '%s\n' "$labels" | grep -Fxq "$label"
          }

          # True only for the one package whose release honors the SDK-pin bypass.
          # Reads the job-global AUTO_SKIP_SDK_PIN_CHECK at call time (set below),
          # keeping the deepagents-code-only guard in a single place.
          skip_applies_to() {
            [ "$1" = "deepagents-code" ] && [ "$AUTO_SKIP_SDK_PIN_CHECK" = "true" ]
          }

          dispatch() {
            local package="$1"
            local cmd=(
              gh workflow run release.yml
              --repo "$GITHUB_REPOSITORY"
              --ref main
              -f package="$package"
              -f version="$VERSION"
              -f release-sha="$RELEASE_SHA"
            )
            if skip_applies_to "$package"; then
              cmd+=(-f dangerous-skip-sdk-pin-check=true)
              echo "Dispatching release for $package (version=$VERSION, sha=$RELEASE_SHA, dangerous-skip-sdk-pin-check=true)"
            else
              echo "Dispatching release for $package (version=$VERSION, sha=$RELEASE_SHA)"
            fi
            # `--repo` is required: this job has no `actions/checkout` step, so
            # `gh` cannot discover the target repo from a local `.git/` and
            # would otherwise fail with `fatal: not a git repository`.
            if "${cmd[@]}"; then
              DISPATCHED+=("$package")
            else
              echo "::error::Failed to dispatch release.yml for $package"
              FAILED+=("$package")
            fi
          }

          # Second pass, run AFTER every dispatch (see call site below): poll for
          # a dispatched run's URL and record it in RUN_URLS. Kept separate from
          # dispatch() on purpose — polling here can never delay, or (if the job
          # hits its timeout mid-poll) starve, the dispatch of later packages.
          # Best-effort and bounded: run creation is usually 1-5s; we wait up to
          # max_poll before giving up. A miss leaves the package out of RUN_URLS
          # (summary falls back to the workflow-page link) and never fails the job.
          locate_run() {
            local package="$1" poll_interval=5 max_poll=90 waited=0 url=""
            while [ "$waited" -lt "$max_poll" ]; do
              url=$(find_run_url "$package" "$DISPATCH_STARTED")
              if [ -n "$url" ]; then
                echo "Located run for $package: $url"
                RUN_URLS["$package"]="$url"
                return
              fi
              sleep "$poll_interval"
              waited=$((waited + poll_interval))
            done
            echo "::warning::Dispatched $package but could not locate its release.yml run within ${max_poll}s; summary will link the workflow page instead."
          }

          # ${VAR:-false} guards against an output ever being unset/empty. assert_bool
          # surfaces a warning if the value is something other than "true"/"false".
          CLI_RELEASE="${CLI_RELEASE:-false}";         assert_bool CLI_RELEASE     "$CLI_RELEASE"
          SDK_RELEASE="${SDK_RELEASE:-false}";         assert_bool SDK_RELEASE     "$SDK_RELEASE"
          ACP_RELEASE="${ACP_RELEASE:-false}";         assert_bool ACP_RELEASE     "$ACP_RELEASE"
          CODE_RELEASE="${CODE_RELEASE:-false}";       assert_bool CODE_RELEASE    "$CODE_RELEASE"
          TALON_RELEASE="${TALON_RELEASE:-false}";     assert_bool TALON_RELEASE   "$TALON_RELEASE"
          DAYTONA_RELEASE="${DAYTONA_RELEASE:-false}"; assert_bool DAYTONA_RELEASE "$DAYTONA_RELEASE"
          MODAL_RELEASE="${MODAL_RELEASE:-false}";     assert_bool MODAL_RELEASE   "$MODAL_RELEASE"
          RUNLOOP_RELEASE="${RUNLOOP_RELEASE:-false}"; assert_bool RUNLOOP_RELEASE "$RUNLOOP_RELEASE"
          VERCEL_RELEASE="${VERCEL_RELEASE:-false}";   assert_bool VERCEL_RELEASE  "$VERCEL_RELEASE"
          QUICKJS_RELEASE="${QUICKJS_RELEASE:-false}"; assert_bool QUICKJS_RELEASE "$QUICKJS_RELEASE"

          AUTO_SKIP_SDK_PIN_CHECK=false
          if [ "$CODE_RELEASE" = "true" ] && release_pr_has_label "$SDK_PIN_BYPASS_LABEL"; then
            AUTO_SKIP_SDK_PIN_CHECK=true
            echo "Release PR has '$SDK_PIN_BYPASS_LABEL'; dispatching deepagents-code with dangerous-skip-sdk-pin-check=true."
          fi

          # Banner: log + step summary. The step summary renders at the top of the
          # run page, so operators see the link before scrolling through step logs.
          echo ""
          echo "================================================================"
          echo "  Publish runs (build / tests / PyPI) live in release.yml:"
          echo "  $RELEASE_WORKFLOW_URL"
          echo "  This job only kicks them off."
          echo "================================================================"
          echo ""

          {
            echo "## Release dispatched"
            echo ""
            echo "This job only **kicks off** the publish workflow. Build, tests, and the actual PyPI publish run as separate \`release.yml\` runs."
            echo ""
            echo "👉 **[View \`release.yml\` runs]($RELEASE_WORKFLOW_URL)** to watch each publish."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Backdate the correlation window by 60s to absorb runner/GitHub clock
          # skew, so `--created` doesn't filter out runs we're about to create.
          # Captured once before any dispatch, then shared by every locate_run
          # call below — all dispatches happen within seconds of this point.
          # `date -d` is GNU coreutils (ubuntu-latest); on a BSD/macOS runner it
          # would fail and leave DISPATCH_STARTED empty, degrading every poll to
          # a graceful miss (still best-effort — no job failure).
          DISPATCH_STARTED=$(date -u -d '-60 seconds' +%Y-%m-%dT%H:%M:%SZ)

          if [ "$CLI_RELEASE" = "true" ];     then dispatch deepagents-cli;      fi
          if [ "$SDK_RELEASE" = "true" ];     then dispatch deepagents;          fi
          if [ "$ACP_RELEASE" = "true" ];     then dispatch deepagents-acp;      fi
          if [ "$CODE_RELEASE" = "true" ];    then dispatch deepagents-code;     fi
          if [ "$TALON_RELEASE" = "true" ];   then dispatch deepagents-talon;    fi
          if [ "$DAYTONA_RELEASE" = "true" ]; then dispatch langchain-daytona;   fi
          if [ "$MODAL_RELEASE" = "true" ];   then dispatch langchain-modal;     fi
          if [ "$RUNLOOP_RELEASE" = "true" ]; then dispatch langchain-runloop;   fi
          if [ "$VERCEL_RELEASE" = "true" ];   then dispatch langchain-vercel-sandbox; fi
          if [ "$QUICKJS_RELEASE" = "true" ]; then dispatch langchain-quickjs;   fi

          # Now that every package has been dispatched, correlate each one to its
          # run URL for the summary. Done as a second pass so a slow/missed
          # correlation can't hold up any dispatch.
          if [ "${#DISPATCHED[@]}" -gt 0 ]; then
            for p in "${DISPATCHED[@]}"; do
              locate_run "$p"
            done
          fi

          # Append per-package status to the step summary so operators see at a
          # glance which packages were queued vs. which need a manual retry.
          {
            echo "### Dispatched (${#DISPATCHED[@]})"
            if [ "${#DISPATCHED[@]}" -gt 0 ]; then
              for p in "${DISPATCHED[@]}"; do
                suffix=""
                if skip_applies_to "$p"; then
                  suffix=" _(SDK pin check skipped from release PR label)_"
                fi
                url="${RUN_URLS[$p]:-}"
                if [ -n "$url" ]; then
                  echo "- [\`$p\` @ \`$VERSION\`]($url)$suffix"
                else
                  echo "- \`$p\` @ \`$VERSION\` _(run link unavailable — see workflow page above)_$suffix"
                fi
              done
            else
              echo "_none_"
            fi
            if [ "${#FAILED[@]}" -gt 0 ]; then
              echo ""
              echo "### Failed (${#FAILED[@]})"
              for p in "${FAILED[@]}"; do echo "- \`$p\`"; done
              echo ""
              echo "Recover with:"
              echo ""
              echo '```'
              for p in "${FAILED[@]}"; do
                if skip_applies_to "$p"; then
                  echo "gh workflow run release.yml -f package=$p -f version=$VERSION -f release-sha=$RELEASE_SHA -f dangerous-skip-sdk-pin-check=true"
                else
                  echo "gh workflow run release.yml -f package=$p -f version=$VERSION -f release-sha=$RELEASE_SHA"
                fi
              done
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Failed to dispatch ${#FAILED[@]} release(s): ${FAILED[*]}"
            echo "::error::Recover with: gh workflow run release.yml -f package=<name> -f version=$VERSION -f release-sha=$RELEASE_SHA"
            exit 1
          fi
