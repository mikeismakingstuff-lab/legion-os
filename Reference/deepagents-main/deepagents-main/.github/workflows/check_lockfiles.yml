# Check that all uv.lock files are up-to-date
#
# Prevents PRs from being merged when lockfiles are out of sync with pyproject.toml

name: "🔒 Check Lockfiles"

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-lockfiles:
    name: "Verify uv.lock files"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: "🐍 Set up Python and uv"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.14"

      - name: "🔍 Check changed lockfiles"
        run: |
          mapfile -t changed < <(git diff --name-only HEAD^ HEAD)
          python3 .github/scripts/check_lockfiles_pre_commit.py "${changed[@]}"
