name: Repo Checks

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run repo checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_AGE_MONTHS: '15'
          FAIL_ON_FINDINGS: 'true'
        run: npm run check:repo-checks
