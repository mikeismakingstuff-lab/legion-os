name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been marked as stale due to inactivity. If this is still relevant,
            leave a comment and it will stay open.
          stale-pr-message: >
            This pull request has been marked as stale due to inactivity. If work is still active,
            leave a comment or push an update and it will stay open.
          close-issue-message: >
            Closing this issue due to prolonged inactivity. It can be reopened if needed.
          close-pr-message: >
            Closing this pull request due to prolonged inactivity. It can be reopened or replaced with a fresh PR.
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,work-in-progress
